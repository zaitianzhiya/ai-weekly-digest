          echo "    - 3秒钩子 → 每个事件一句话抓住读者"
          echo "    - 两层阅读结构 → 钩子层 + 详情层"
          echo "    - Prompt 与代码分离 → prompts/weekly-deep.md"

          mkdir -p output

