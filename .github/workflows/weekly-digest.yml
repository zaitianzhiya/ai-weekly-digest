name: AI Weekly Digest — Full Pipeline

# 继承 GitHub Weekly Curation 的工程实践:
# 1. 双工作流: daily-collect（轻量日常）+ weekly-publish（全量周报）
# 2. 看门狗: 周一三次检查，主工作流丢失则自动补发
# 3. Prompt分离: prompts/ 目录修改无需重新部署
# 4. 反馈闭环: feedback/ 目录规则自动追加到下次运行

on:
  schedule:
    # 每周一 01:00 UTC (09:00 CST) — 主运行
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      week_range:
        description: '手动指定周范围 (如 2026.07.06-2026.07.12)，留空自动计算'
        required: false

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'

jobs:
  weekly-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # === STEP 0: 环境准备 ===
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml httpx

      # === STEP 1: 计算周元数据 ===
      - name: Compute week metadata
        id: week
        run: |
          if [ -n "${{ github.event.inputs.week_range }}" ]; then
            echo "[Manual] Using: ${{ github.event.inputs.week_range }}"
          fi

          # ISO 周号
          WEEK_NUM=$(date +%Y-W%V)
          echo "week_number=${WEEK_NUM}" >> $GITHUB_OUTPUT

          # 本周一 (周一作为一周开始)
          DAY_OF_WEEK=$(date +%u)
          OFFSET=$((DAY_OF_WEEK - 1))
          MONDAY=$(date -d "-${OFFSET} days" +%Y.%m.%d)
          SUNDAY=$(date -d "+$((6 - OFFSET)) days" +%Y.%m.%d)
          echo "week_start=${MONDAY}" >> $GITHUB_OUTPUT
          echo "week_end=${SUNDAY}" >> $GITHUB_OUTPUT
          echo "report_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

          echo "Week: ${WEEK_NUM} | Range: ${MONDAY} - ${SUNDAY}"

      # === STEP 2: 去重检查（借鉴 AI Safety Digest 跨周去重） ===
      - name: Check if already generated
        id: check
        run: |
          OUTPUT_FILE="output/${{ steps.week.outputs.week_number }}.md"
          if [ -f "${OUTPUT_FILE}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ 本期周报已存在: ${OUTPUT_FILE}，跳过生成"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ 生成新周报: ${{ steps.week.outputs.week_number }}"
          fi

      # === STEP 3: 数据库初始化 ===
      - name: Initialize Database
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ ! -f "db/ai_weekly_digest.db" ]; then
            echo "创建 SQLite 数据库..."
            python3 db/init_db.py --schema-only
          fi
          echo "数据库就绪"

      # === STEP 4: 多源信息采集（借鉴 ① 五层架构中的采集层） ===
      - name: Collect AI News (Multi-Source)
        if: steps.check.outputs.exists == 'false'
        id: collect
        run: |
          echo "## Phase 1: 多源信息采集"
          echo "  Tier 1: 企业官方 + 学术 + 政府"
          echo "  Tier 2: 科技媒体 + 行业数据"

          # 生成采集上下文（上期回顾 + 当前周信息 + Prompt 模板）
          python3 scripts/generate_context.py --context > /tmp/context.json

          echo "采集上下文已生成: $(wc -c < /tmp/context.json) bytes"
          echo "context_ready=true" >> $GITHUB_OUTPUT

      # === STEP 5: Claude API 调用 — 筛选 + 分析 + 生成（借鉴 ② AI处理层） ===
